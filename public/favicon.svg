      <path fill="url(#neonDark)" d="M151 118v168l34 47V191l72 71 72-71v142l33-47V118L257 221 151 118z"/>
      <path fill="url(#neon)" d="M151 118v168l34 47V191l72 71 72-71v142l33-47V118L257 221 151 118z" opacity="0.86"/>
      <path fill="#051007" opacity="0.92" d="M186 190v142l-35-47V118l106 103 105-103v168l-34 47V191l-71 71-71-72z"/>
      <path fill="url(#neon)" d="M151 118v168l34 47V191l72 71 72-71v142l33-47V118L257 221 151 118z" opacity="0.82"/>
    </g>

    <g filter="url(#softGlow)">
      <path fill="url(#neon)" d="M268 279l42-43v29l-30 30v52h-22v-59c0-3 4-6 10-9z"/>
      <rect x="258" y="287" width="22" height="63" rx="10" fill="url(#neon)"/>
      <circle cx="241" cy="346" r="28" fill="url(#neon)"/>
