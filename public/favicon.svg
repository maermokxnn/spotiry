    <g text-anchor="middle">
      <text x="256" y="410" fill="url(#word)" font-family="Arial, Helvetica, sans-serif" font-size="35" font-weight="700" letter-spacing="16" filter="url(#fineGlow)">MAERMOK</text>
      <g fill="none" stroke="url(#neon)" stroke-linecap="round" stroke-width="3">
